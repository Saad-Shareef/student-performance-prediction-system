<!DOCTYPE html>
<html>
<head>
    <title>Daily Activity Tracker</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>📅 Daily Activity Tracker</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}

            <div class="success-message">
                {{ message }}
            </div>

        {% endfor %}
    {% endif %}
{% endwith %}

    <form method="POST">

        <input type="number"
               step="0.1"
               name="study_hours"
               placeholder="Study Hours"
               required>

        <input type="number"
               step="0.1"
               name="sleep_hours"
               placeholder="Sleep Hours"
               required>

        <input type="number"
               step="0.1"
               name="attendance"
               placeholder="Attendance %"
               required>

        <input type="number"
               name="stress_level"
               placeholder="Stress Level (1-10)"
               required>

        <select name="assignment_completed">

            <option value="1">
                Assignment Completed
            </option>

            <option value="0">
                Assignment Not Completed
            </option>

        </select>

        <input type="number"
               step="0.1"
               name="social_media_hours"
               placeholder="Social Media Hours"
               required>

        <button type="submit">

            Save Activity

        </button>

    </form>

</div>

</body>
</html>
