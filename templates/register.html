<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Create Account</h1>

            <form method="POST">

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>

                <select name="role" required>

                    <option value="" disabled selected>
                        Select Role
                    </option>

                    <option value="student">
                        🎓 Student
                    </option>

                    <option value="teacher">
                        👨‍🏫 Teacher
                    </option>

                    <option value="admin">
                        🛡 Admin
                    </option>

                </select>
                
                <button type="submit">

                    Register

                </button>

            </form>

            <p class="bottom-text">

                Already have an account?

                <a href="/">
                    Login
                </a>

            </p>

        </div>

    </div>

</body>

</html>
